<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple PDF document icon -->
  <rect x="6" y="4" width="20" height="24" fill="#dc2626" rx="2"/>
  <rect x="8" y="6" width="16" height="20" fill="white" rx="1"/>
  
  <!-- Text lines -->
  <rect x="10" y="9" width="12" height="1" fill="#dc2626"/>
  <rect x="10" y="12" width="10" height="1" fill="#dc2626"/>
  <rect x="10" y="15" width="11" height="1" fill="#dc2626"/>
  <rect x="10" y="18" width="9" height="1" fill="#dc2626"/>
  
  <!-- PDF text -->
  <text x="16" y="24" font-family="Arial, sans-serif" font-size="4" font-weight="bold" fill="#dc2626" text-anchor="middle">PDF</text>
</svg>
